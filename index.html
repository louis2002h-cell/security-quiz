<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보안퀴즈 — NFT 수료증 발급</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --border: rgba(99,179,237,0.15);
    --accent: #63b3ed;
    --green: #68d391;
    --red: #fc8181;
    --text: #e2e8f0;
    --muted: #718096;
    --mono: 'Space Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 48px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  header {
    width: 100%;
    max-width: 720px;
    padding: 48px 24px 0;
    text-align: center;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  h1 { font-size: clamp(28px, 5vw, 40px); font-weight: 700; line-height: 1.2; margin-bottom: 12px; }
  h1 span { color: var(--accent); }
  .subtitle { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 32px; }

  .section { width: 100%; max-width: 720px; padding: 0 24px; margin-bottom: 20px; }

  /* 지갑 */
  .wallet-bar {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .wallet-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); font-family: var(--mono); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .btn-main {
    background: var(--accent); color: #0a0e1a; border: none;
    border-radius: 8px; padding: 10px 20px;
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: opacity .2s;
  }
  .btn-main:hover { opacity: .8; }
  .btn-main:disabled { opacity: .4; cursor: not-allowed; }

  /* 진행 */
  .prog-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); font-family: var(--mono); margin-bottom: 8px; }
  .prog-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; width: 0%; }

  /* 퀴즈 카드 */
  .quiz-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px; margin-bottom: 12px;
  }
  .q-num { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 2px; margin-bottom: 12px; }
  .q-text { font-size: 17px; font-weight: 500; line-height: 1.6; margin-bottom: 24px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; font-size: 14px;
    cursor: pointer; text-align: left; color: var(--text);
    font-family: var(--sans); display: flex; align-items: center; gap: 12px;
    transition: all .2s;
  }
  .opt-label { font-family: var(--mono); font-size: 11px; color: var(--accent); min-width: 20px; }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: rgba(99,179,237,0.08); transform: translateX(4px); }
  .opt.correct { border-color: var(--green); background: rgba(104,211,145,0.1); color: var(--green); }
  .opt.wrong { border-color: var(--red); background: rgba(252,129,129,0.1); color: var(--red); }
  .opt:disabled { cursor: not-allowed; }

  .feedback {
    margin-top: 16px; padding: 12px 16px; border-radius: 8px;
    font-size: 13px; line-height: 1.6; display: none;
  }
  .feedback.show { display: block; }
  .fb-ok { background: rgba(104,211,145,0.1); border: 1px solid rgba(104,211,145,0.3); color: var(--green); }
  .fb-no { background: rgba(252,129,129,0.1); border: 1px solid rgba(252,129,129,0.3); color: var(--red); }

  .btn-next {
    width: 100%; background: transparent; border: 1px solid var(--accent);
    border-radius: 10px; padding: 14px; color: var(--accent);
    font-family: var(--mono); font-size: 13px; cursor: pointer;
    transition: all .2s; display: none;
  }
  .btn-next:hover { background: var(--accent); color: #0a0e1a; }

  /* 결과 */
  .result-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px 32px; text-align: center;
  }
  .result-icon { font-size: 48px; margin-bottom: 16px; }
  .result-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .result-score { font-family: var(--mono); font-size: 40px; font-weight: 700; color: var(--accent); margin: 16px 0; }
  .result-desc { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 28px; }
  .btn-mint {
    background: var(--accent); color: #0a0e1a; border: none;
    border-radius: 10px; padding: 16px 32px;
    font-family: var(--mono); font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all .2s; width: 100%; max-width: 320px;
  }
  .btn-mint:hover:not(:disabled) { opacity: .85; transform: translateY(-2px); }
  .btn-mint:disabled { opacity: .4; cursor: not-allowed; }
  .status-msg { margin-top: 16px; font-size: 13px; font-family: var(--mono); color: var(--muted); min-height: 20px; }
  .status-msg.ok { color: var(--green); }
  .status-msg.err { color: var(--red); }
  .status-msg.load { color: var(--accent); }
  .btn-retry {
    background: transparent; border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 24px; color: var(--muted);
    font-family: var(--mono); font-size: 12px; cursor: pointer;
    margin-top: 12px; transition: all .2s;
  }
  .btn-retry:hover { border-color: var(--accent); color: var(--accent); }
  footer { padding: 24px; font-size: 11px; color: var(--muted); font-family: var(--mono); text-align: center; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Security Quiz · NFT Certificate</div>
  <h1>보안 지식을 증명하고<br><span>NFT 수료증</span>을 받으세요</h1>
  <p class="subtitle">5개의 보안 퀴즈를 모두 맞추면 Polygon 네트워크에서<br>NFT 수료증이 여러분의 지갑으로 발급됩니다.</p>
</header>

<!-- 지갑 -->
<div class="section" id="sec-wallet">
  <div class="wallet-bar">
    <div class="wallet-status">
      <div class="dot" id="dot"></div>
      <span id="wallet-label">MetaMask 지갑을 연결해주세요</span>
    </div>
    <button class="btn-main" id="btn-connect" onclick="connectWallet()">지갑 연결</button>
  </div>
</div>

<!-- 진행 -->
<div class="section" id="sec-progress">
  <div class="prog-info">
    <span id="prog-text">0 / 5 완료</span>
    <span id="score-text">점수: 0점</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
</div>

<!-- 퀴즈 -->
<div class="section" id="sec-quiz">
  <div class="quiz-card">
    <div class="q-num" id="q-num">Q.01 / 05</div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="opts"></div>
    <div class="feedback" id="feedback"></div>
  </div>
  <button class="btn-next" id="btn-next" onclick="nextQ()">다음 문제 →</button>
</div>

<!-- 결과 -->
<div class="section" id="sec-result" style="display:none;">
  <div class="result-card">
    <div class="result-icon" id="r-icon">🎉</div>
    <div class="result-title" id="r-title">퀴즈 완료!</div>
    <div class="result-score" id="r-score">0 / 5</div>
    <div class="result-desc" id="r-desc"></div>
    <button class="btn-mint" id="btn-mint" onclick="mintNFT()">NFT 수료증 발급받기 →</button>
    <div class="status-msg" id="status"></div>
    <br>
    <button class="btn-retry" onclick="restart()">↺ 다시 풀기</button>
  </div>
</div>

<footer>louis2002h-cell / security-quiz · Polygon Amoy Testnet</footer>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
// ── 설정 ──────────────────────────────────────
const CONTRACT_ADDRESS = "0xd9145CCE52D386f254917e481eB44e9943F39138";
const ABI = [{"inputs":[],"name":"createCertificate","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"nonpayable","type":"function"}];
// ─────────────────────────────────────────────

const QS = [
  { q:"피싱(Phishing) 공격이란 무엇인가요?",
    opts:["컴퓨터 파일을 암호화하여 몸값을 요구하는 공격","신뢰할 수 있는 기관인 척 속여 개인정보를 탈취하는 공격","네트워크 트래픽을 과부하시켜 서비스를 마비시키는 공격","다른 사람의 무선 네트워크에 몰래 접속하는 행위"],
    ans:1, exp:"피싱은 은행·기업 등을 사칭해 비밀번호·카드번호 등 민감 정보를 빼내는 사회공학적 공격입니다." },
  { q:"강력한 비밀번호의 조건으로 가장 올바른 것은?",
    opts:["기억하기 쉽게 생년월일을 사용한다","영문 소문자만으로 12자리 이상 구성한다","영문 대소문자, 숫자, 특수문자를 조합하여 8자리 이상 사용한다","모든 사이트에 동일한 비밀번호를 사용하되 길게 만든다"],
    ans:2, exp:"강력한 비밀번호는 대소문자+숫자+특수문자 조합 8자리 이상이며, 사이트마다 다르게 써야 합니다." },
  { q:"HTTPS가 HTTP보다 안전한 이유는 무엇인가요?",
    opts:["데이터 전송 속도가 더 빠르기 때문에","SSL/TLS 암호화로 데이터를 보호하기 때문에","서버 용량이 더 크기 때문에","광고를 차단해주기 때문에"],
    ans:1, exp:"HTTPS는 SSL/TLS로 브라우저↔서버 통신을 암호화해 중간자 공격(MITM)으로부터 보호합니다." },
  { q:"2단계 인증(2FA)을 사용하는 가장 큰 이유는?",
    opts:["로그인 속도를 높이기 위해","비밀번호가 유출되더라도 계정을 보호하기 위해","비밀번호를 더 짧게 만들어도 되기 위해","인터넷 연결 없이도 로그인하기 위해"],
    ans:1, exp:"2FA는 비밀번호 외 OTP·SMS 등 2번째 인증을 요구해 비밀번호 탈취 시에도 계정을 보호합니다." },
  { q:"랜섬웨어(Ransomware)에 감염됐을 때 가장 올바른 대응은?",
    opts:["즉시 몸값을 지불하여 파일을 복구한다","감염된 파일을 모두 직접 삭제한다","네트워크 연결을 끊고 전문 기관에 신고 및 도움을 요청한다","컴퓨터를 재시작하면 해결된다"],
    ans:2, exp:"감염 즉시 네트워크를 차단해 확산을 막고 KISA 등 전문 기관에 신고하세요. 몸값 지불은 권고하지 않습니다." }
];

let cur = 0, score = 0, answered = false;
let account = null, provider = null, signer = null;

function $(id){ return document.getElementById(id); }

function render() {
  const q = QS[cur];
  $('q-num').textContent = 'Q.' + String(cur+1).padStart(2,'0') + ' / 05';
  $('q-text').textContent = q.q;
  const wrap = $('opts');
  wrap.innerHTML = '';
  ['A','B','C','D'].forEach((lbl, i) => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = '<span class="opt-label">'+lbl+'</span>' + q.opts[i];
    b.onclick = () => pick(i);
    wrap.appendChild(b);
  });
  $('feedback').className = 'feedback';
  $('feedback').textContent = '';
  $('btn-next').style.display = 'none';
  answered = false;
  updateProg();
}

function pick(i) {
  if (answered) return;
  answered = true;
  const q = QS[cur];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);
  const fb = $('feedback');
  if (i === q.ans) {
    btns[i].classList.add('correct');
    score++;
    fb.className = 'feedback show fb-ok';
    fb.textContent = '✓ 정답입니다! ' + q.exp;
  } else {
    btns[i].classList.add('wrong');
    btns[q.ans].classList.add('correct');
    fb.className = 'feedback show fb-no';
    fb.textContent = '✗ 오답입니다. ' + q.exp;
  }
  updateProg();
  const nb = $('btn-next');
  nb.style.display = 'block';
  nb.textContent = cur < QS.length - 1 ? '다음 문제 →' : '결과 확인하기 →';
}

function nextQ() {
  cur++;
  if (cur < QS.length) { render(); }
  else { showResult(); }
}

function updateProg() {
  const done = answered ? cur + 1 : cur;
  $('prog-fill').style.width = (done / QS.length * 100) + '%';
  $('prog-text').textContent = done + ' / ' + QS.length + ' 완료';
  $('score-text').textContent = '점수: ' + score + '점';
}

function showResult() {
  $('sec-quiz').style.display = 'none';
  $('sec-progress').style.display = 'none';
  $('sec-result').style.display = 'block';

  $('r-score').textContent = score + ' / ' + QS.length;
  const passed = score >= 4;

  if (passed) {
    $('r-icon').textContent = '🎉';
    $('r-title').textContent = '합격! NFT 수료증 발급 가능';
    $('r-desc').textContent = score + '문제 정답! 아래 버튼으로 NFT 수료증을 발급받으세요. (4문제 이상 시 발급)';
    const mb = $('btn-mint');
    mb.style.display = 'block';
    if (account) {
      mb.disabled = false;
      mb.textContent = 'NFT 수료증 발급받기 →';
    } else {
      mb.disabled = true;
      mb.textContent = '지갑을 먼저 연결해주세요';
    }
  } else {
    $('r-icon').textContent = '📚';
    $('r-title').textContent = '아쉽습니다! 재도전해보세요';
    $('r-desc').textContent = score + '문제 정답. NFT 발급은 4문제 이상 필요합니다.';
    $('btn-mint').style.display = 'none';
  }
}

function restart() {
  cur = 0; score = 0; answered = false;
  $('sec-quiz').style.display = 'block';
  $('sec-progress').style.display = 'block';
  $('sec-result').style.display = 'none';
  $('btn-mint').style.display = 'block';
  $('status').textContent = '';
  $('status').className = 'status-msg';
  render();
}

async function connectWallet() {
  if (!window.ethereum) { alert('MetaMask를 설치해주세요. (metamask.io)'); return; }
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    account = accounts[0];
    provider = new ethers.providers.Web3Provider(window.ethereum);
    signer = provider.getSigner();
    $('dot').classList.add('on');
    $('wallet-label').textContent = account.slice(0,6) + '...' + account.slice(-4) + ' 연결됨';
    $('btn-connect').textContent = '연결됨';
    $('btn-connect').disabled = true;
    // 결과 화면에 있고 합격이면 발급 버튼 활성화
    if ($('sec-result').style.display !== 'none' && score >= 4) {
      $('btn-mint').disabled = false;
      $('btn-mint').textContent = 'NFT 수료증 발급받기 →';
    }
  } catch(e) {
    alert('지갑 연결 실패: ' + e.message);
  }
}

async function mintNFT() {
  if (!account) { alert('지갑을 먼저 연결해주세요.'); return; }
  const mb = $('btn-mint');
  mb.disabled = true;
  mb.textContent = '발급 처리 중...';
  setStatus('MetaMask에서 서명 요청 중...', 'load');
  try {
    const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    const tx = await contract.createCertificate();
    setStatus('트랜잭션 전송됨, 확인 대기 중...', 'load');
    await tx.wait();
    setStatus('🎉 NFT 수료증이 발급되었습니다!', 'ok');
    mb.textContent = '발급 완료! ✓';
  } catch(e) {
    setStatus('발급 실패: ' + (e.reason || e.message), 'err');
    mb.disabled = false;
    mb.textContent = 'NFT 수료증 발급받기 →';
  }
}

function setStatus(msg, type) {
  const el = $('status');
  el.textContent = msg;
  el.className = 'status-msg ' + (type || '');
}

// 시작
render();
</script>
</body>
</html>
